<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
        <title>Mapa da Retaguarda - BUXO SCUT I-PASS</title>
        <meta name="description" content="Mapa interativo de leitos da retaguarda do pronto-socorro" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="css/mapa-retaguarda.css" />
    </head>

    <body>
        <!-- ===== HEADER ===== -->
        <header class="mr-header">
            <div class="mr-header-top">
                <a href="index.html" class="mr-logo">
                    <div class="mr-logo-icon">🗺️</div>
                    <div>
                        <div class="mr-logo-text">Mapa da Retaguarda</div>
                        <div class="mr-logo-sub">BUXO SCUT I-PASS</div>
                    </div>
                </a>

                <div class="mr-header-actions">
                    <div class="mr-view-toggle">
                        <a href="index.html" class="mr-view-btn" style="text-decoration: none;">📋 <span class="hide-mobile">Lista Pcte</span></a>
                        <a href="mapa-retaguarda.html" class="mr-view-btn active" style="text-decoration: none;">🗺️ <span class="hide-mobile">Mapa</span></a>
                    </div>
                    <a href="/" class="mr-btn" style="white-space: nowrap;">💊 <span class="hide-mobile">Medicamentos</span></a>
                </div>

                <div class="mr-search">
                    <span class="mr-search-icon">🔍</span>
                    <input type="text" id="mrSearch" placeholder="Buscar paciente ou leito..." />
                </div>
            </div>

            <!-- Filters -->
            <div class="mr-filters">
                <button class="mr-filter-chip active" data-filter="all">Todos <span class="chip-count">0</span></button>
                <button class="mr-filter-chip" data-filter="vago">🔵 Vagos <span class="chip-count">0</span></button>
                <button class="mr-filter-chip" data-filter="estavel">
                    🟢 Estáveis <span class="chip-count">0</span>
                </button>
                <button class="mr-filter-chip" data-filter="alerta">
                    🟠 Alertas <span class="chip-count">0</span>
                </button>
                <button class="mr-filter-chip" data-filter="instavel">
                    🔴 Instáveis <span class="chip-count">0</span>
                </button>
                <button class="mr-filter-chip" data-filter="semleito">
                    🟣 Sem Leito <span class="chip-count">0</span>
                </button>
                <button class="mr-filter-chip" data-filter="conflito">
                    ⚠️ Conflitos <span class="chip-count">0</span>
                </button>
            </div>
        </header>

        <!-- ===== MAIN CONTENT ===== -->
        <main class="mr-main" id="mrContent">
            <!-- Map or List rendered here by JS -->
        </main>

        <!-- ===== SEM LEITO DRAWER ===== -->
        <div class="mr-drawer" id="mrDrawer">
            <div class="mr-drawer-handle" id="mrDrawerHandle">
                <div class="mr-drawer-pill"></div>
                <span class="mr-drawer-title">Sem Leito</span>
                <span class="mr-drawer-count" id="mrDrawerCount">0</span>
            </div>
            <div class="mr-drawer-body">
                <div class="mr-drawer-list" id="mrDrawerList">
                    <!-- Unassigned patients listed here -->
                </div>
            </div>
        </div>

        <!-- ===== COCKPIT OVERLAY ===== -->
        <div class="mr-cockpit-overlay" id="mrCockpit">
            <div class="mr-cockpit-header" id="mrCockpitHeader">
                <!-- Rendered by JS -->
            </div>
            <div class="mr-cockpit-body" id="mrCockpitBody">
                <!-- Rendered by JS -->
            </div>
        </div>

        <script src="js/mapa-retaguarda-app.js"></script>
    </body>
</html>
