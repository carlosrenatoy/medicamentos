name: 🐛 Bug
description: Reportar comportamento incorreto do sistema
labels: [bug]
body:
  - type: textarea
    id: passos
    attributes:
      label: Passos para reproduzir
      placeholder: |
        1. Estou na view Retaguarda
        2. Clico em "Novo Paciente"
        3. ...
    validations:
      required: true
  - type: textarea
    id: esperado
    attributes:
      label: Comportamento esperado
    validations:
      required: true
  - type: textarea
    id: observado
    attributes:
      label: Comportamento observado
    validations:
      required: true
  - type: dropdown
    id: gravidade
    attributes:
      label: Gravidade clínica
      description: Impacto no fluxo de plantão
      options:
        - Crítica (paciente em risco / dados perdidos)
        - Alta (fluxo bloqueado / workaround difícil)
        - Média (incômodo, há workaround)
        - Baixa (cosmético)
    validations:
      required: true
  - type: input
    id: navegador
    attributes:
      label: Navegador / dispositivo
      placeholder: Chrome 130 / iPad / etc.
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot ou vídeo
      description: Atenção LGPD — não inclua nomes ou RGHC reais. Borre se necessário.
  - type: checkboxes
    id: lgpd
    attributes:
      label: Confirmação LGPD
      options:
        - label: Confirmo que screenshots/dados anexados estão anonimizados
          required: true
