name: ✨ Funcionalidade
description: Propor nova feature ou melhoria
labels: [feature]
body:
  - type: textarea
    id: problema
    attributes:
      label: Problema clínico
      description: Que dor concreta no fluxo de plantão isto resolve?
    validations:
      required: true
  - type: dropdown
    id: usuario
    attributes:
      label: Usuário primário
      options:
        - Médico plantonista
        - Médico coordenador
        - Enfermagem
        - Múltiplos
    validations:
      required: true
  - type: textarea
    id: criterio
    attributes:
      label: Critério de aceitação (Dado / Quando / Então)
      placeholder: |
        Dado que ...
        Quando ...
        Então ...
    validations:
      required: true
  - type: textarea
    id: fora_escopo
    attributes:
      label: Fora do escopo
      description: O que NÃO está incluído nesta proposta
  - type: input
    id: spec
    attributes:
      label: Spec relacionada (se já existe)
      placeholder: specs/0001-passagem-de-plantao.md
