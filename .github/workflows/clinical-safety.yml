name: Clinical Safety Checks

on:
  pull_request:
  push:
    branches:
      - main
      - feat/no-ai-prescription-safety

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Verify app
        run: npm run verify
